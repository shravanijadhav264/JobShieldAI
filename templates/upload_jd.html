<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Job Description</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    
    {% if session.get('uploaded_file') %}

    <div class="alert alert-success text-center mt-3">

        Resume Uploaded Successfully:
        <strong>{{ session.get('uploaded_file') }}</strong>

    </div>

    {% endif %}
    <div class="container-fluid main-container">

        <header class="top-navbar">
            <div class="logo-section">
                <img src="{{ url_for('static', filename='logo.png') }}"class="logo-img">

                <h1>
                    <span style="color:#00bf63;">JobShield</span>AI
                </h1>
            </div>
            <div class="nav-buttons">
                <button onclick="window.location.href='/'">
                    Home
                </button>
                <button onclick="window.location.href='/scam-checker'">
                    Scam Checker
                </button>
            </div>
        </header>

        <h3 class="page-title">
            Resume Matching System
        </h3>
        <header_>
            <div class="steps">
                <div class="step">Step 1: Add Resume/CV</div>
                <div class="step active">Step 2: Add Job Description</div>
                <div class="step">Step 3: Analyze</div>
            </div>
        </header_>
        <main>

            <div class="upload-container2">

                <h2>Paste Job Description</h2>

                <form id="matchForm" action="/analyze" method="POST">
                    <div class="text-paste2">

                        <textarea id="jd_text" name="jd_text" rows="8" placeholder="Paste full job description here..."
                            required></textarea>

                    </div>

                    <br>

                    <button type="submit" class="analyze-btn" id="matchBtn">

                        Analyze Resume Match

                    </button>

                </form>

            </div>

        </main>

    </div>


    <script>

        document.getElementById("matchForm")
            .addEventListener("submit", function () {

                const btn = document.getElementById("matchBtn");

                btn.disabled = true;

                btn.innerHTML = `
        <span class="spinner-border spinner-border-sm"></span>
        Analyzing...
    `;
            });

    </script>
</body>

</html>
